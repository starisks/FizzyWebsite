<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Your Solves | Cube Trainer</title>
  <meta name="description" content="View your Rubik's Cube solve history, times, and performance stats. Track your progress over time.">
  <meta name="robots" content="noindex, follow">

  <link rel="stylesheet" href="styles.css">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8550924801420852"
     crossorigin="anonymous"></script>
</head>

<body>

<nav class="nav">
  <h1>Cube Trainer</h1>
  <div>
    <a href="/">Home</a>
    <a href="/timer.html">Timer</a>
    <a href="/blog.html">Blog</a>
  </div>
</nav>

<main class="container">

  <section class="card">
    <h2>Your Solves</h2>
    <div id="solves"></div>
  </section>

</main>

<script src="script.js"></script>

<script>
async function loadProfile() {
  const token = localStorage.getItem("token");

  if (!token) {
    document.getElementById("solves").innerHTML = "<p>Please login first.</p>";
    return;
  }

  try {
    const res = await fetch("/api/solves/user", {
      headers: {
        Authorization: token
      }
    });

    if (!res.ok) throw new Error("Request failed");

    const data = await res.json();

    const div = document.getElementById("solves");
    div.innerHTML = "";

    data.forEach(s => {
      div.innerHTML += `<p>${s.time}s</p>`;
    });

  } catch (err) {
    document.getElementById("solves").innerHTML = "<p>Error loading solves.</p>";
    console.error(err);
  }
}

loadProfile();
</script>

<script>
requireAuth();
</script>

</body>
</html>
