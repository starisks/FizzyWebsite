<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8550924801420852"
     crossorigin="anonymous"></script>
</head>
<body>

<h2>Your Solves</h2>
<div id="solves"></div>

<script src="script.js"></script>
<script>
async function loadProfile() {
  const res = await fetch("/api/solves/user", {
    headers: { Authorization: localStorage.token }
  });

  const data = await res.json();

  const div = document.getElementById("solves");

  data.forEach(s => {
    div.innerHTML += `<p>${s.time}s</p>`;
  });
}

loadProfile();
</script>

</body>
</html>
