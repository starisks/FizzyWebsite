<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Cube Trainer</title>
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="nav">
  <h1>Cube Trainer</h1>
</nav>

<main class="container">
  <div class="card">
    <h2>Register</h2>

    <form onsubmit="register(event)">
      <input id="regEmail" type="email" placeholder="Email" required>
      <input id="regPassword" type="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

  </div>
</main>

<script src="script.js"></script>
<!-- CMP BANNER -->
<div id="cmpBanner" class="cmp hidden">
  <p>We use cookies to improve your experience.</p>

  <div class="cmp-buttons">
    <button onclick="acceptAllCookies()">Accept All</button>
    <button onclick="rejectAllCookies()">Reject All</button>
    <button onclick="openPreferences()">Manage</button>
  </div>
</div>

<!-- CMP MODAL -->
<div id="cmpModal" class="cmp-modal hidden">
  <div class="cmp-content">
    <h2>Cookie Preferences</h2>

    <label>
      <input type="checkbox" checked disabled>
      Necessary (always enabled)
    </label>

    <label>
      <input type="checkbox" id="analyticsCookies">
      Analytics Cookies
    </label>

    <label>
      <input type="checkbox" id="personalizationCookies">
      Personalization Cookies
    </label>

    <div class="cmp-buttons">
      <button onclick="savePreferences()">Save</button>
      <button onclick="closePreferences()">Cancel</button>
    </div>
  </div>
</div>
<footer class="footer">
  <div>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <button onclick="openPreferences()">Cookie Settings</button>
  </div>

  <p>© 2026 Cube Trainer</p>
</footer>
</body>
</html>
