<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rubik's Cube Timer – WCA Speedcubing Trainer</title>

<meta name="description" content="Professional Rubik's Cube timer with WCA inspection, averages, leaderboard and personal best tracking.">

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8550924801420852"crossorigin="anonymous">
  
</script>
<meta name="robots" content="index, follow">
</head>

<body>

<nav class="nav">
  <h1>Cube Trainer</h1>
  <div id="navUser">
    <span id="userEmail"></span>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<main class="container">

<section class="card">
  <h2 id="scramble"></h2>
  <h1 id="timer">0.000</h1>
  <p>Press SPACE to start</p>
</section>

<section class="card">
  <h3 id="ao5">Ao5: N/A</h3>
  <h3 id="ao12">Ao12: N/A</h3>
  <h3 id="pb">PB: N/A</h3>

  <!-- VIRAL BUTTON -->
  <button onclick="sharePB()">Share PB 🔥</button>
</section>

<section class="card">
  <canvas id="chart"></canvas>
</section>

<section class="card">
  <h2>Leaderboard</h2>
  <div id="leaderboard"></div>
</section>

<section class="card">
  <h2>3D Cube Trainer</h2>
  <div id="cube-container"></div>
</section>

</main>

<script src="script.js"></script>

<script>
  requireAuth();
</script>

<!-- CMP BANNER -->
<div id="cmpBanner" class="cmp hidden">
  <p>We use cookies to improve your experience.</p>

  <div class="cmp-buttons">
    <button onclick="acceptAllCookies()">Accept All</button>
    <button onclick="rejectAllCookies()">Reject All</button>
    <button onclick="openPreferences()">Manage</button>
  </div>
</div>

<!-- CMP MODAL -->
<div id="cmpModal" class="cmp-modal hidden">
  <div class="cmp-content">
    <h2>Cookie Preferences</h2>

    <label>
      <input type="checkbox" checked disabled>
      Necessary (always enabled)
    </label>

    <label>
      <input type="checkbox" id="analyticsCookies">
      Analytics Cookies
    </label>

    <label>
      <input type="checkbox" id="personalizationCookies">
      Personalization Cookies
    </label>

    <div class="cmp-buttons">
      <button onclick="savePreferences()">Save</button>
      <button onclick="closePreferences()">Cancel</button>
    </div>
  </div>
</div>
<footer class="footer">
  <div>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <button onclick="openPreferences()">Cookie Settings</button>
  </div>
</body>
</html>
