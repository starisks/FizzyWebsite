<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Cube Trainer</title>

<link rel="stylesheet" href="styles.css">

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// DEFAULT = denied
gtag('consent', 'default', {
  'ad_storage': 'denied',
  'analytics_storage': 'denied',
  'ad_user_data': 'denied',
  'ad_personalization': 'denied'
});
</script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8550924801420852"
crossorigin="anonymous"></script>
</head>

<body>

<script>
if(localStorage.getItem("token")) location.href="/timer.html";
</script>

<nav class="nav">
  <h1>Cube Trainer</h1>
</nav>

<main class="container">
  <div class="card">
    <h2>Login</h2>

    <form onsubmit="login(event)">
      <input id="loginEmail" type="email" placeholder="Email" required>
      <input id="loginPassword" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

  </div>
</main>

<script src="script.js"></script>
<!-- CMP BANNER -->
<div id="cmpBanner" class="cmp hidden">
  <p>We use cookies to improve your experience.</p>

  <div class="cmp-buttons">
    <button onclick="acceptAllCookies()">Accept All</button>
    <button onclick="rejectAllCookies()">Reject All</button>
    <button onclick="openPreferences()">Manage</button>
  </div>
</div>

<!-- CMP MODAL -->
<div id="cmpModal" class="cmp-modal hidden">
  <div class="cmp-content">
    <h2>Cookie Preferences</h2>

    <label>
      <input type="checkbox" checked disabled>
      Necessary (always enabled)
    </label>

    <label>
      <input type="checkbox" id="analyticsCookies">
      Analytics Cookies
    </label>

    <label>
      <input type="checkbox" id="personalizationCookies">
      Personalization Cookies
    </label>

    <div class="cmp-buttons">
      <button onclick="savePreferences()">Save</button>
      <button onclick="closePreferences()">Cancel</button>
    </div>
  </div>
</div>
<footer class="footer">
  <div>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <button onclick="openPreferences()">Cookie Settings</button>
  </div>

  <p>© 2026 Cube Trainer</p>
</footer>
</body>
</html>
