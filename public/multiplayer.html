<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multiplayer Cube Battle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body>

<nav class="nav">
  <h1>Multiplayer Battle</h1>
  <a href="/timer.html">Back</a>
</nav>

<main class="container">

  <div class="card">
    <h2>Join Room</h2>
    <input id="roomInput" placeholder="Room Code">
    <button onclick="joinRoom()">Join</button>
  </div>

  <div class="card">
    <h2>Scramble</h2>
    <p id="scramble">Waiting...</p>
  </div>

  <div class="card">
    <h1 id="timer">0.000</h1>
    <p>Press SPACE</p>
  </div>

  <div class="card">
    <h2>Players</h2>
    <div id="players"></div>
  </div>

</main>

<script src="multiplayer.js"></script>
</body>
</html>
